name: ticket_scanner_app
description: QR Ticket Scanner App for Event Management
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.1

  # State Management
  provider: ^6.1.2

  # Local Storage (persist token)
  shared_preferences: ^2.2.3

  # QR Scanner (camera)
  mobile_scanner: ^5.1.1

  # Navigation
  go_router: ^13.2.4

  # Date formatting
  intl: ^0.19.0

  # Show QR image from code string
  qr_flutter: ^4.1.0

  # Cached network image
  cached_network_image: ^3.3.1

  cupertino_icons: ^1.0.6
  envied: ^1.3.3
  get: ^4.6.6
  flutter_secure_storage: ^9.0.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  envied_generator: ^1.3.3
  build_runner: ^2.12.2

flutter:
  uses-material-design: true
